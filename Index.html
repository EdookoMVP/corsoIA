<!DOCTYPE html>
<html lang="it">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Corso IA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- ░░ FONT: per cambiarli, sostituisci i nomi qui sotto e nelle variabili --font-* ░░ -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Quicksand:wght@500;600;700&family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet">

  <style>
    /* ╔══════════════════════════════════════════════════════════════╗
       ║  PER CAMBIARE FONT E DIMENSIONI MODIFICA SOLO QUESTE RIGHE     ║
       ╚══════════════════════════════════════════════════════════════╝
       • --font-display  = font dei TITOLI
       • --font-body     = font del TESTO da leggere e dell'interfaccia
       • --size-*        = dimensioni (in "rem": 1rem ≈ 16px. 1.1rem ≈ 17-18px)   */
    :root{
      --font-display:'Quicksand', 'Roboto', system-ui, sans-serif;
      --font-body:'Roboto', system-ui, -apple-system, sans-serif;
      --weight-body:300;       /* spessore del testo da leggere (300 = light) */

      --size-title:1.4rem;     /* titolo della card            */
      --size-body:1.08rem;     /* testo della narrazione       */
      --size-question:1.08rem; /* testo delle domande          */
      --size-option:1rem;      /* risposte del quiz            */

      /* ── Colori (puoi cambiarli, ma non è necessario) ── */
      --paper:#FAF8F4;
      --surface:#FFFFFF;
      --ink:#2B2B33;
      --ink-soft:#54545F;
      --muted:#9A9AA3;
      --hair:#ECE8E0;
      --hair-soft:#F3EFE8;
      --accent:#5B5BD6;
      --accent-700:#4444B8;
      --accent-soft:#EDEDFB;
      --ok:#16A06A;
      --ok-soft:#E6F6EE;
      --ko:#E05656;
      --ko-soft:#FCECEC;
      --shadow:0 1px 2px rgba(43,43,51,.04), 0 10px 30px rgba(43,43,51,.06);
      --radius:18px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{ overflow:hidden; }
    #auth{ height:100vh; overflow-y:auto; }
    body{
      margin:0; font-family:var(--font-body); font-weight:var(--weight-body);
      background:var(--paper); color:var(--ink);
      -webkit-font-smoothing:antialiased;
    }
    button{ font-family:inherit; }
    .hidden{ display:none !important; }

    /* ── Bottoni ── */
    .btn{
      appearance:none; border:none; cursor:pointer;
      background:var(--accent); color:#fff; font-weight:700; letter-spacing:.01em;
      font-size:.95rem; padding:12px 28px; border-radius:14px;
      transition:background .18s ease, transform .06s ease;
      box-shadow:0 2px 6px rgba(91,91,214,.22);
    }
    .btn:hover{ background:var(--accent-700); }
    .btn:active{ transform:translateY(1px); }
    .btn:disabled{ background:#CBCBDD; box-shadow:none; cursor:not-allowed; }
    .btn-ghost{ background:transparent; color:var(--accent); box-shadow:none; padding:6px 0; font-weight:700; font-size:.82rem; }
    .btn-ghost:hover{ background:transparent; text-decoration:underline; }
    :focus-visible{ outline:2px solid var(--accent); outline-offset:3px; border-radius:6px; }

    /* ── Ingresso ── */
    #auth{ min-height:100%; display:flex; align-items:center; justify-content:center; padding:28px; }
    .auth-card{ width:100%; max-width:440px; background:var(--surface); border:1px solid var(--hair); border-radius:24px; box-shadow:var(--shadow); padding:42px 36px; }
    .eyebrow{ font-size:.72rem; font-weight:700; letter-spacing:.13em; text-transform:uppercase; color:var(--accent); margin:0 0 14px; }
    .auth-card h1{ font-family:var(--font-display); font-weight:700; font-size:1.7rem; line-height:1.2; margin:0 0 8px; }
    .auth-sub{ color:var(--muted); font-size:.92rem; margin:0 0 26px; }
    .field{ margin-bottom:12px; }
    .field input{ width:100%; padding:13px 16px; font-size:.95rem; border:1.5px solid var(--hair); border-radius:13px; background:#fff; color:var(--ink); }
    .field input::placeholder{ color:#B8B6AE; }
    .field input:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
    #auth .btn{ width:100%; margin-top:10px; padding:14px; }

    /* ── Layout ── */
    #app{ display:none; min-height:100%; }
    #app.show{ display:grid; grid-template-columns:300px 1fr; }

    /* Rail percorso */
    .rail{ border-right:1px solid var(--hair); background:var(--surface); padding:30px 24px 24px; display:flex; flex-direction:column; height:100vh; position:sticky; top:0; }
    .rail-brand{ margin-bottom:24px; }
    .rail-brand .eyebrow{ margin-bottom:6px; }
    .rail-brand h2{ font-family:var(--font-display); font-weight:700; font-size:1.2rem; margin:0; line-height:1.25; }
    .steps{ flex:1; overflow-y:auto; margin:0 -6px; padding:0 6px; }
    .step{ position:relative; display:flex; gap:14px; align-items:flex-start; padding:9px 0; }
    .step::before{ content:""; position:absolute; left:13px; top:30px; bottom:-9px; width:2px; background:var(--hair); }
    .step:last-child::before{ display:none; }
    .step.done::before{ background:var(--accent); }
    .marker{
      flex-shrink:0; width:28px; height:28px; border-radius:50%;
      display:flex; align-items:center; justify-content:center; z-index:1;
      border:2px solid var(--hair); background:var(--surface); color:var(--muted);
      transition:all .25s ease;
    }
    .marker svg{ width:14px; height:14px; }
    .step.active .marker{ border-color:var(--accent); color:var(--accent); box-shadow:0 0 0 4px var(--accent-soft); }
    .step.done .marker{ border-color:var(--accent); background:var(--accent); color:#fff; }
    .step .label{ font-size:.88rem; line-height:1.4; color:var(--muted); padding-top:4px; }
    .step.active .label{ color:var(--accent-700); font-weight:700; }
    .step.done .label{ color:var(--ink-soft); }
    .step.clickable{ cursor:pointer; }
    .step.clickable:hover .label{ color:var(--accent); }
    .rail-foot{ border-top:1px solid var(--hair); margin-top:18px; padding-top:16px; font-size:.82rem; color:var(--muted); }
    .rail-foot .who{ display:block; color:var(--ink); font-weight:700; margin-bottom:4px; }

    /* Lettore */
    .reader{ height:100vh; overflow-y:auto; }
    .reader-inner{ max-width:720px; margin:0 auto; padding:30px 28px 130px; }
    .topbar{ position:sticky; top:0; z-index:5; background:linear-gradient(var(--paper) 70%, rgba(250,248,244,0)); padding:8px 0 16px; margin-bottom:6px; display:flex; align-items:center; gap:14px; }
    .topbar-exit{ display:none; flex:0 0 auto; border:1px solid var(--hair); background:#fff; color:var(--ink-soft); font-family:inherit; font-size:.82rem; font-weight:600; padding:7px 14px; border-radius:999px; cursor:pointer; }
    .topbar-exit:hover{ background:var(--accent-soft); color:var(--accent); }
    .progress{ flex:1; height:6px; border-radius:99px; background:var(--hair); overflow:hidden; }
    .progress > i{ display:block; height:100%; width:0; background:var(--accent); border-radius:99px; transition:width .4s ease; }
    .progress-label{ font-size:.78rem; font-weight:700; color:var(--muted); white-space:nowrap; }

    /* Barra di avanzamento fissa in fondo (non scorre via) */
    .botbar{ position:fixed; left:300px; right:0; bottom:0; z-index:30; display:flex; align-items:center; gap:14px;
      padding:12px 28px; background:rgba(255,255,255,.92); backdrop-filter:blur(6px); border-top:1px solid var(--hair); }
    /* Bottone Esci flottante (mobile) */
    .float-exit{ display:none; position:fixed; top:10px; right:12px; z-index:31; border:1px solid var(--hair);
      background:rgba(255,255,255,.95); color:var(--ink-soft); font-family:inherit; font-size:.8rem; font-weight:600;
      padding:7px 14px; border-radius:999px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .float-exit:hover{ background:var(--accent-soft); color:var(--accent); }

    /* Card */
    .card{ background:var(--surface); border:1px solid var(--hair); border-radius:var(--radius); box-shadow:var(--shadow); padding:30px 32px; margin-bottom:22px; }
    .card.enter{ animation:rise .55s cubic-bezier(.16,.84,.28,1) both; }
    @keyframes rise{ from{ opacity:0; transform:translateY(34px) scale(.985); } to{ opacity:1; transform:translateY(0) scale(1); } }
    .card .kind{ font-size:.7rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin:0 0 10px; }
    .card h3{ font-family:var(--font-display); font-weight:700; letter-spacing:-.01em; font-size:var(--size-title); line-height:1.25; margin:0 0 18px; }

    .fig{ margin:0 0 22px; border-radius:14px; overflow:hidden; border:1px solid var(--hair); background:var(--hair-soft); }
    .fig img{ display:block; width:100%; height:auto; max-height:220px; object-fit:contain; background:var(--hair-soft); }
    .fig.fallback{ aspect-ratio:16/9; display:flex; align-items:center; justify-content:center;
      background:radial-gradient(120% 120% at 0% 0%, var(--accent-soft) 0%, transparent 55%), radial-gradient(120% 120% at 100% 100%, #EAEAFA 0%, transparent 50%), var(--hair-soft);
      color:var(--muted); font-size:.82rem; }
    .fig.fallback span{ padding:6px 12px; border:1px solid var(--hair); border-radius:99px; background:rgba(255,255,255,.6); }

    .prose p{ font-size:var(--size-body); font-weight:var(--weight-body); line-height:1.78; color:var(--ink-soft); margin:0 0 1.05em; }
    .prose p:last-child{ margin-bottom:0; }
    .prose h4{ font-family:var(--font-display); font-weight:700; font-size:1.32rem; line-height:1.3; color:var(--ink); margin:.2em 0 .5em; }
    .prose [data-size="grande"]{ font-size:1.28rem; }
    .prose [data-size="grande"] p{ font-size:1.28rem; }
    .prose [data-size="piccolo"]{ font-size:.92rem; }
    .prose [data-size="piccolo"] p{ font-size:.92rem; }
    .prose figure.cardmedia{ margin:22px 0; text-align:center; }
    .prose figure.cardmedia img{ max-width:100%; max-height:380px; border-radius:14px; border:1px solid var(--hair); }
    .prose figure.cardmedia .video-wrap{ position:relative; padding-bottom:56.25%; height:0; border-radius:14px; overflow:hidden; border:1px solid var(--hair); }
    .prose figure.cardmedia .video-wrap iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }

    /* parola che appare (effetto scrittura) */
    .prose .w{ opacity:0; animation:fadeWord .26s ease forwards; }
    @keyframes fadeWord{ to{ opacity:1; } }
    .caret{ display:inline-block; width:2px; height:1.05em; background:var(--accent); margin-left:2px; vertical-align:-2px; border-radius:1px; animation:blink 1s steps(2,end) infinite; }
    @keyframes blink{ 50%{ opacity:0; } }

    .card-actions{ margin-top:24px; }
    .card-actions.pending{ display:none; }
    .card-actions.reveal{ animation:rise .35s ease both; }

    .question{ font-size:var(--size-question); line-height:1.6; color:var(--ink-soft); margin:0 0 20px; }
    .options{ display:flex; flex-direction:column; gap:11px; margin-bottom:6px; }
    .opt{ display:flex; align-items:center; gap:13px; padding:14px 18px; border:1.5px solid var(--hair); border-radius:14px; cursor:pointer; background:#fff; color:var(--ink); font-size:var(--size-option); transition:all .15s ease; text-align:left; }
    .opt:hover{ border-color:#C9C9EC; background:#FCFCFF; }
    .opt .tick{ flex-shrink:0; width:21px; height:21px; border-radius:50%; border:2px solid var(--hair); display:flex; align-items:center; justify-content:center; transition:all .15s ease; }
    .opt .tick svg{ width:11px; height:11px; opacity:0; transition:opacity .12s ease; }
    .opt.selected{ border-color:var(--accent); background:var(--accent-soft); font-weight:700; }
    .opt.selected .tick{ border-color:var(--accent); background:var(--accent); }
    .opt.selected .tick svg{ opacity:1; }
    .opt.correct{ border-color:var(--ok); background:var(--ok-soft); color:#06603F; font-weight:700; }
    .opt.correct .tick{ border-color:var(--ok); background:var(--ok); }
    .opt.correct .tick svg{ opacity:1; }
    .opt.wrong{ border-color:var(--ko); background:var(--ko-soft); color:#8F2A2A; font-weight:700; }
    .opt.wrong .tick{ border-color:var(--ko); background:var(--ko); }
    .opt.wrong .tick svg{ opacity:1; }
    .opt[disabled]{ cursor:default; }
    .opt[disabled]:hover{ background:#fff; border-color:var(--hair); }
    .opt.correct[disabled]:hover{ border-color:var(--ok); background:var(--ok-soft); }
    .opt.selected[disabled]:hover{ border-color:var(--accent); background:var(--accent-soft); }

    .text-input{ width:100%; padding:13px 16px; font-size:.97rem; border:1.5px solid var(--hair); border-radius:13px; margin-bottom:6px; }
    .q-prose{ margin-bottom:18px; }
    .text-area{ width:100%; min-height:120px; padding:13px 16px; font-size:1rem; line-height:1.5; border:1.5px solid var(--hair); border-radius:13px; margin-bottom:8px; font-family:inherit; resize:vertical; color:var(--ink); }
    .text-area:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
    .dc-frase{ font-size:var(--size-body); line-height:2.2; }
    .dc-blank{ font-size:.98rem; padding:5px 10px; border:1.5px solid var(--accent); border-radius:10px; background:var(--accent-soft); color:var(--ink); font-family:inherit; margin:0 3px; cursor:pointer; vertical-align:middle; }
    .dc-blank:focus{ outline:none; box-shadow:0 0 0 3px var(--accent-soft); }
    .dc-blank.ok{ border-color:var(--ok); background:var(--ok-soft); color:var(--ok); font-weight:700; }
    .dc-blank.ko{ border-color:var(--ko); background:var(--ko-soft); color:var(--ko); font-weight:700; }
    .text-input:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }

    .feedback{ margin-top:18px; padding:14px 16px; border-radius:13px; font-size:.92rem; line-height:1.55; display:none; }
    .feedback.show{ display:block; animation:rise .3s ease both; }
    .feedback p{ margin:0 0 .6em; } .feedback p:last-child{ margin-bottom:0; }
    .feedback figure.cardmedia{ margin:12px 0; text-align:center; }
    .feedback figure.cardmedia img{ max-width:100%; max-height:300px; border-radius:10px; }
    .feedback figure.cardmedia .video-wrap{ position:relative; padding-bottom:56.25%; height:0; border-radius:10px; overflow:hidden; }
    .feedback figure.cardmedia .video-wrap iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }
    .feedback.ok{ background:var(--ok-soft); border:1px solid #BEE9D6; color:#06603F; }
    .feedback.ko{ background:var(--ko-soft); border:1px solid #F2CBCB; color:#8F2A2A; }

    .done-screen{ text-align:center; padding:60px 32px; background:radial-gradient(120% 120% at 50% 0%, var(--accent-soft) 0%, transparent 60%), var(--surface); border:1px solid var(--hair); border-radius:var(--radius); box-shadow:var(--shadow); }
    .done-screen .seal{ width:58px; height:58px; border-radius:50%; margin:0 auto 18px; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; }
    .done-screen h3{ font-family:var(--font-display); font-weight:700; font-size:1.5rem; margin:0 0 8px; }
    .done-screen p{ color:var(--muted); font-size:.95rem; margin:0 0 18px; }
    .done-email{ display:flex; gap:10px; margin-top:6px; }
    .done-email input{ flex:1; padding:12px 15px; font-size:.95rem; border:1.5px solid var(--hair); border-radius:13px; background:#fff; color:var(--ink); font-family:inherit; }
    .done-email input:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
    .done-skip{ display:block; margin-top:10px; background:none; border:none; color:var(--muted); font-size:.82rem; cursor:pointer; text-decoration:underline; font-family:inherit; }

    #alert{ position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; background:rgba(43,43,51,.42); padding:18px; backdrop-filter:blur(2px); }
    .alert-box{ background:#fff; border-radius:20px; padding:28px 26px; max-width:360px; width:100%; text-align:center; box-shadow:0 12px 40px rgba(0,0,0,.18); }
    .alert-box p{ color:var(--ink-soft); font-size:.95rem; line-height:1.5; margin:0 0 20px; }
    .alert-box .btn{ width:100%; }

    .chapter{ margin:44px 2px 8px; animation:rise .5s cubic-bezier(.16,.84,.28,1) both; }
    .chapter:first-child{ margin-top:6px; }
    .chapter h2{ font-family:var(--font-display); font-weight:700; font-size:1.65rem; line-height:1.25; color:var(--ink); margin:0 0 12px; letter-spacing:-.01em; }
    .chapter .rule{ height:3px; width:56px; background:var(--accent); border-radius:2px; }
    .rail-chapter{ font-size:.7rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft); margin:16px 0 8px; padding-top:14px; border-top:1px solid var(--hair); }
    .rail-chapter:first-child{ border-top:none; padding-top:0; margin-top:0; }

    @media (max-width:880px){
      #app.show{ grid-template-columns:1fr; }
      .rail{ display:none; }
      .reader{ height:100vh; overflow-y:auto; -webkit-overflow-scrolling:touch; }
      .reader-inner{ padding:52px 14px 88px; }
      .card{ padding:20px 16px; border-radius:14px; }
      :root{ --size-title:1.22rem; --size-body:1.04rem; --size-question:1.04rem; }
      .botbar{ left:0; padding:11px 16px; }
      .float-exit{ display:block; }
      .auth-card{ padding:32px 22px; }
      .fig img{ max-height:300px; }
      .prose figure.cardmedia img{ max-height:260px; }
      .opt{ padding:15px 16px; }                 /* tap target più alto */
      .btn{ padding:14px 24px; font-size:1rem; } /* bottoni comodi col pollice */
      .done-email{ flex-direction:column; }
      .done-email .btn{ width:100%; }
      .chapter h2{ font-size:1.34rem; }
      .chapter{ margin:32px 2px 6px; }
    }
    @media (prefers-reduced-motion:reduce){ *{ animation:none !important; transition:none !important; } }
  </style>
</head>
<body>

  <!-- ALERT -->
  <div id="alert" class="hidden">
    <div class="alert-box">
      <p id="alert-text"></p>
      <button class="btn" onclick="chiudiAlert()">Ho capito</button>
    </div>
  </div>

  <!-- INGRESSO -->
  <div id="auth">
    <div class="auth-card">
      <p class="eyebrow" id="auth-eyebrow">Corso</p>
      <h1 id="auth-title">Come funziona un'Intelligenza Artificiale</h1>
      <p class="auth-sub">Un percorso a piccoli passi: leggi, rifletti, rispondi. Costruirai i concetti uno alla volta.</p>
      <div class="field"><input type="text" id="in-nome"    placeholder="Nome"></div>
      <div class="field"><input type="text" id="in-cognome" placeholder="Cognome"></div>
      <button class="btn" onclick="startPlatform()">Inizia il percorso</button>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <aside class="rail">
      <div class="rail-brand">
        <p class="eyebrow">Percorso</p>
        <h2 id="rail-title">Come funziona una IA</h2>
      </div>
      <nav class="steps" id="steps"></nav>
      <div class="rail-foot">
        <span class="who" id="who"></span>
        <button class="btn-ghost" onclick="logout()">Esci</button>
      </div>
    </aside>

    <main class="reader">
      <div class="reader-inner">
        <button class="float-exit" onclick="logout()" title="Esci">Esci</button>
        <div id="cards"></div>
      </div>
    </main>

    <div class="botbar">
      <div class="progress"><i id="bar"></i></div>
      <span class="progress-label" id="prog"></span>
    </div>
  </div>

  <script>
  /* ░░ VELOCITÀ DEL TESTO CHE SCORRE (millisecondi per parola). Più basso = più veloce ░░ */
  var VELOCITA_TESTO = 45;

  /* ══════════════════════════════════════════════════
     CONTENUTO DI RISERVA (solo per l'anteprima fuori da Apps Script)
     ══════════════════════════════════════════════════ */
  var FALLBACK_CARDS = [
    { id:1, tipo:'narrazione', titolo:'Un cambio di paradigma',
      testo:"Ciao! Oggi capiremo a livello intuitivo come funziona una rete neurale e cosa caratterizza i modelli di Intelligenza Artificiale Generativa che usi tutti i giorni.\n\nGuarda questa immagine: una macchia confusa di pixel grigi e neri, tutta sgranata. Eppure il tuo cervello dà un'occhiata e, in una frazione di secondo, senza il minimo sforzo, giunge a una conclusione certa: «è un tre».\n\nIl nostro sistema visivo è frutto di milioni di anni di evoluzione. Diamo per scontato quanto sia facile, per noi, riconoscere uno schema.",
      mediaUrl:'https://drive.google.com/file/d/1sjgppM9ptrUmpeQAlgqZTAkPq0icYRhY/view', opzioni:[], rispostaCorretta:'', feedbackEsatto:'', feedbackErrato:'' },
    { id:2, tipo:'narrazione', titolo:"L'illusione della semplicità",
      testo:"La cosa interessante è proprio questa: siccome a noi sembra facile, per decenni abbiamo pensato che sarebbe stato facile insegnarlo anche a un computer. Questa illusione ha dato il via a una delle avventure più affascinanti e complesse del secolo scorso — un'avventura ancora oggi in pieno svolgimento.\n\nNell'estate del 1956, a Dartmouth, un gruppo di persone si riunisce convinto di poter rispondere in pochi mesi a una domanda enorme: come si rende intelligente una macchina? E non erano persone qualsiasi: in quella stanza c'erano alcune delle menti più brillanti del Novecento.",
      mediaUrl:'https://drive.google.com/file/d/13XuSWldFhwmCbRToxxTe0uKSgILE_6S6/view', opzioni:[], rispostaCorretta:'', feedbackEsatto:'', feedbackErrato:'' },
    { id:3, tipo:'narrazione', titolo:'Il problema delle regole rigide',

  /* ── STATO ── */
  var cards=[], currentIndex=0, renderedUpTo=-1;
  var studentKey='', studentName='', studentEmail='';
  var selezione={};

  /* ── Ponte Apps Script (sicuro anche in anteprima) ── */
  function inAppsScript(){ return (typeof google!=='undefined' && google.script && google.script.run); }
  function gas(fn){
    var args=Array.prototype.slice.call(arguments,1);
    if(inAppsScript()){ try{ google.script.run[fn].apply(google.script.run,args); }catch(e){} }
  }
  function prefersReduced(){ try{ return window.matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){ return false; } }

  /* ── Storage con fallback in memoria ── */
  var mem={};
  function sGet(k){ try{ return localStorage.getItem(k); }catch(e){ return (k in mem)?mem[k]:null; } }
  function sSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=String(v); } }
  function sDel(k){ try{ localStorage.removeItem(k); }catch(e){ delete mem[k]; } }

  /* ── AVVIO ── */
  function applicaTitolo(t){
    if(!t) return;
    document.title=t;
    var rt=document.getElementById('rail-title'); if(rt) rt.innerText=t;
    var at=document.getElementById('auth-title'); if(at) at.innerText=t;
    var ae=document.getElementById('auth-eyebrow'); if(ae) ae.innerText='Corso';
  }
  window.onload=function(){
    if(inAppsScript()){
      google.script.run.withSuccessHandler(applicaTitolo).withFailureHandler(function(){}).getTitoloModulo();
      google.script.run
        .withSuccessHandler(function(d){ cards=(d&&d.length)?d:FALLBACK_CARDS; checkAuth(); })
        .withFailureHandler(function(){ cards=FALLBACK_CARDS; checkAuth(); })
        .getCardConfig();
    } else { cards=FALLBACK_CARDS; checkAuth(); }
  };

  function checkAuth(){
    var s=sGet('papiro_student');
    if(s){ try{ var p=JSON.parse(s); studentKey=p.key; studentName=p.name; studentEmail=p.email; avviaCorso(); }catch(e){} }
  }

  function startPlatform(){
    var nome=val('in-nome'), cognome=val('in-cognome');
    if(!nome||!cognome){ apriAlert('Inserisci nome e cognome per continuare.'); return; }
    studentKey=nome+' '+cognome; studentName=studentKey; studentEmail='';
    sSet('papiro_student', JSON.stringify({key:studentKey,name:studentName,email:''}));
    gas('salvaStudente', studentName, '');
    avviaCorso();
  }

  function isCapitolo(i){ return cards[i] && cards[i].tipo==='capitolo'; }

  function avviaCorso(){
    document.getElementById('auth').classList.add('hidden');
    document.getElementById('app').classList.add('show');
    document.getElementById('who').innerText=studentName;
    var saved=parseInt(sGet('papiro_progress_'+studentKey),10);
    currentIndex=(!isNaN(saved)&&saved>=0)?Math.min(saved,cards.length):0;
    // se il progresso punta a un capitolo, avanza fino alla prima card vera
    while(currentIndex<cards.length && isCapitolo(currentIndex)) currentIndex++;
    renderedUpTo=-1; document.getElementById('cards').innerHTML='';
    renderSteps();
    for(var i=0;i<=currentIndex&&i<cards.length;i++){
      if(isCapitolo(i)) appendCapitolo(i);
      else appendCard(i, i===currentIndex);
      renderedUpTo=i;
    }
    if(currentIndex>=cards.length) showDone();
    updateProgress(); inviaProgresso();
  }

  function logout(){
    sDel('papiro_student');
    document.getElementById('app').classList.remove('show');
    document.getElementById('auth').classList.remove('hidden');
    ['in-nome','in-cognome'].forEach(function(id){ document.getElementById(id).value=''; });

  /* ══ RAIL ══ */
  function iconTipo(tipo){
    if(tipo==='quiz'||tipo==='mappa_neurale'){
      // punto interrogativo
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 2.4-3 4"/><line x1="12" y1="17.4" x2="12" y2="17.5"/></svg>';
    }
    if(tipo==='video'){
      return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    }
    // fumetto (narrazione, testo, default)
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.5 8.5 0 0 1-12.5 7.5L3 21l2-5.5A8.5 8.5 0 1 1 21 11.5z"/></svg>';
  }

  function renderSteps(){
    var nav=document.getElementById('steps'); nav.innerHTML='';
    var n=0; // contatore dei passi reali (i capitoli non contano)
    cards.forEach(function(card,i){
      if(card.tipo==='capitolo'){
        var sec=document.createElement('div');
        sec.className='rail-chapter';
        sec.innerText=soloTesto(card.testo);
        nav.appendChild(sec);
        return;
      }
      n++;
      var state=(i<currentIndex)?'done':(i===currentIndex?'active':'locked');
      var clickable=(i<=currentIndex&&i<cards.length);
      var el=document.createElement('div');
      el.className='step '+state+(clickable?' clickable':'');
      el.innerHTML='<span class="marker">'+iconTipo(card.tipo)+'</span><span class="label">'+esc(card.titolo||('Passo '+n))+'</span>';
      if(clickable){ el.onclick=(function(id){ return function(){ scrollToCard(id); }; })(card.id); }
      nav.appendChild(el);
    });
  }

  function updateProgress(){
    var tot=0, done=0;
    for(var i=0;i<cards.length;i++){
      if(isCapitolo(i)) continue;     // i capitoli non contano come passi
      tot++;
      if(i<currentIndex) done++;
    }
    var pct=tot?Math.round(done/tot*100):0;
    document.getElementById('bar').style.width=pct+'%';
    document.getElementById('prog').innerText=pct+'% completato';
  }

  /* ══ CARD ══ */
  function appendCard(i,isActive){
    var card=cards[i];
    var div=document.createElement('div');
    div.id='card-'+card.id; div.className='card'+(isActive?' enter':'');
    div.innerHTML=buildCardHtml(card,isActive);
    document.getElementById('cards').appendChild(div);
    renderMediaBlocks(div);
    if(isActive){
      if(card.tipo==='narrazione'){ streamNarrazione(card); }
      setTimeout(function(){ scrollToCard(card.id); }, 80);
    } else { finalizeStatic(card); }
  }

  /* Intestazione di capitolo: fuori e sopra le card, non è un passo */
  function soloTesto(html){ var d=document.createElement('div'); d.innerHTML=String(html||''); return d.textContent||''; }
  function appendCapitolo(i){
    var card=cards[i];
    var div=document.createElement('div');
    div.id='card-'+card.id; div.className='chapter enter';
    div.innerHTML='<h2>'+esc(soloTesto(card.testo))+'</h2><div class="rule"></div>';
    document.getElementById('cards').appendChild(div);
  }

  function buildCardHtml(card,isActive){
    switch(card.tipo){
      case 'quiz':          return htmlQuiz(card,isActive);
      case 'aperta':        return htmlAperta(card,isActive);
      case 'completamento': return htmlCompletamento(card,isActive);
      case 'testo':         return htmlTesto(card,isActive);
      case 'video':         return htmlVideo(card,isActive);
      case 'mappa_neurale': return htmlMappa(card,isActive);
      default:              return htmlNarrazione(card,isActive);
    }
  }

  function header(card,label){ return card.titolo ? '<h3>'+esc(card.titolo)+'</h3>' : ''; }

    if(!card.mediaUrl||!card.mediaUrl.trim()) return '';
    return '<div class="fig"><img src="'+driveUrl(card.mediaUrl)+'" alt="" '+
           'onerror="this.parentNode.classList.add(\'fallback\');this.parentNode.innerHTML=&quot;<span>Illustrazione del passo</span>&quot;;"></div>';
  }

  /* ══ TESTO CHE SCORRE ══ */
  function streamNarrazione(card){
    var host=document.getElementById('prose-'+card.id);
    var actions=document.getElementById('act-'+card.id);
    if(!host) return;

    function reveal(){ if(actions){ actions.classList.remove('pending'); actions.classList.add('reveal'); } }

    // Renderizza l'HTML pulito
    host.innerHTML=pulisciHTML(card.testo);
    renderMediaBlocks(host);

    if(prefersReduced()){ reveal(); return; }

    // Raccoglie tutte le parole nei nodi testo del DOM renderizzato
    // e le sostituisce con <span class="w"> per l'animazione,
    // preservando intatti i tag HTML (strong, em, p, span…)
    var wordSpans=[];
    function wrapTextNode(node){
      if(node.nodeType===1 && node.classList && node.classList.contains('cardmedia')) return; // non animare i media
      if(node.nodeType===3){
        var txt=node.textContent;
        if(!txt.trim()) return;
        var frag=document.createDocumentFragment();
        txt.split(/(\s+)/).forEach(function(part){
          if(!part) return;
          if(/^\s+$/.test(part)){ frag.appendChild(document.createTextNode(part)); return; }
          var sp=document.createElement('span');
          sp.style.opacity='0';
          sp.style.transition='opacity .26s ease';
          sp.textContent=part;
          wordSpans.push(sp); frag.appendChild(sp);
        });
        node.parentNode.replaceChild(frag,node);
      } else if(node.nodeType===1){
        Array.prototype.slice.call(node.childNodes).forEach(wrapTextNode);
      }
    }
    wrapTextNode(host);

    var i=0, timer=null;
    function finishAll(){
      if(timer) clearTimeout(timer);
      wordSpans.forEach(function(s){ s.style.opacity='1'; });
      host.onclick=null; reveal();
    }
    function step(){
      if(i>=wordSpans.length){ finishAll(); return; }
      wordSpans[i].style.opacity='1';
      i++; timer=setTimeout(step,VELOCITA_TESTO);
    }
    host.onclick=finishAll;   // clic per saltare l'animazione
    step();
  }

  /* ══ INTERAZIONI ══ */
  function seleziona(id,oi){
    var box=document.getElementById('opts-'+id);
    Array.prototype.forEach.call(box.querySelectorAll('.opt'),function(o){ o.classList.remove('selected'); });
    document.getElementById('opt-'+id+'-'+oi).classList.add('selected');
    selezione[id]=getCard(id).opzioni[oi];

  function verificaQuiz(id){
    var card=getCard(id), scelta=selezione[id];
    if(!scelta){ apriAlert('Seleziona una risposta prima di verificare.'); return; }
    var corretta=(scelta.toLowerCase().trim()===String(card.rispostaCorretta).toLowerCase().trim());
    var opts=document.getElementById('opts-'+id).querySelectorAll('.opt');
    gas('salvaRispostaInSheet', studentName, id, card.titolo, scelta, corretta?'CORRETTO':'ERRATO');
    // blocca tutte le opzioni: si risponde una volta sola
    Array.prototype.forEach.call(opts,function(o){ o.disabled=true; o.classList.remove('selected'); });
    (card.opzioni||[]).forEach(function(opz,oi){
      var el=document.getElementById('opt-'+id+'-'+oi);
      if(opz.toLowerCase().trim()===String(card.rispostaCorretta).toLowerCase().trim()) el.classList.add('correct');
      else if(opz===scelta) el.classList.add('wrong');

    mostraFeedback(id, corretta, corretta?card.feedbackEsatto:card.feedbackErrato);
    proseguiSottoFeedback(id);
  }

    if(corretta){ document.getElementById('txt-'+id).disabled=true; mostraFeedback(id,true,card.feedbackEsatto); setTimeout(function(){ prosegui(id); },1200); }

    else { mostraFeedback(id,false,card.feedbackErrato); }
  }

  function prosegui(id){
    var card=getCard(id);
    if(card.tipo==='narrazione'||card.tipo==='video') gas('salvaRispostaInSheet', studentName, id, card.titolo, 'prosegui', 'OK');
    avanza();
  }

  /* ══ AVANZAMENTO ══ */
  function realStats(){
    var tot=0, done=0;
    for(var i=0;i<cards.length;i++){ if(isCapitolo(i)) continue; tot++; if(i<currentIndex) done++; }
    return { done:done, tot:tot };
  }
  function inviaProgresso(){ var s=realStats(); gas('salvaProgresso', studentName, s.done, s.tot); }

  function avanza(){
    finalizeActive();
    currentIndex++;
    // renderizza eventuali capitoli che precedono la prossima card vera
    while(currentIndex<cards.length && isCapitolo(currentIndex)){
      appendCapitolo(currentIndex);
      renderedUpTo=currentIndex;
      currentIndex++;
    }
    sSet('papiro_progress_'+studentKey,currentIndex);
    renderSteps(); updateProgress(); inviaProgresso();
    if(currentIndex<cards.length){ appendCard(currentIndex,true); renderedUpTo=currentIndex; }
    else showDone();
  }

  function finalizeActive(){
    if(currentIndex<0||currentIndex>=cards.length) return;
    var el=document.getElementById('card-'+cards[currentIndex].id); if(!el) return;
    Array.prototype.forEach.call(el.querySelectorAll('button.btn, .opt, input'),function(b){ b.disabled=true; });
  }

  function finalizeStatic(card){
    if(card.tipo==='quiz'){
      (card.opzioni||[]).forEach(function(opz,oi){ var o=document.getElementById('opt-'+card.id+'-'+oi); if(o&&opz.toLowerCase().trim()===String(card.rispostaCorretta).toLowerCase().trim()) o.classList.add('correct'); });
      mostraFeedback(card.id,true,card.feedbackEsatto);
    } else if(card.tipo==='testo'){
      var inp=document.getElementById('txt-'+card.id); if(inp) inp.value=card.rispostaCorretta;
      mostraFeedback(card.id,true,card.feedbackEsatto);
    } else if(card.tipo==='mappa_neurale'){
      mostraFeedback(card.id,true,card.feedbackEsatto);
    } else if(card.tipo==='completamento'){
      var box=document.getElementById('card-'+card.id);
      if(box){ Array.prototype.forEach.call(box.querySelectorAll('.dc-blank'),function(s){ s.value=s.getAttribute('data-correct')||''; s.classList.add('ok'); s.disabled=true; }); }
      if(card.feedbackEsatto) mostraFeedback(card.id,true,card.feedbackEsatto);
    } else if(card.tipo==='aperta'){
      if(card.feedbackEsatto) mostraFeedback(card.id,true,card.feedbackEsatto);
    }
  }

  function showDone(){
    inviaProgresso();
    var div=document.createElement('div'); div.className='done-screen enter';
    div.innerHTML='<div class="seal">'+checkSvg(22)+'</div><h3>Modulo completato!</h3>'+
      '<p>Ottimo lavoro. Vuoi ricevere per email un riepilogo dei contenuti e delle tue risposte?</p>'+
      '<div class="done-email">'+
        '<input type="email" id="email-fine" placeholder="La tua email (facoltativa)">'+
        '<button class="btn" onclick="inviaEmail()">Invia</button>'+
      '</div>'+
      '<button class="done-skip" onclick="saltaEmail()">No grazie, continua senza email</button>';
    document.getElementById('cards').appendChild(div);
    setTimeout(function(){ div.scrollIntoView({behavior:'smooth',block:'center'}); },80);
  }

  function inviaEmail(){
    var email=(document.getElementById('email-fine').value||'').trim();
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ apriAlert('Inserisci un indirizzo email valido.'); return; }
    studentEmail=email;
    sSet('papiro_student', JSON.stringify({key:studentKey,name:studentName,email:email}));
    gas('salvaStudente', studentName, email);
    if(!sGet('papiro_done_'+studentKey)){
      sSet('papiro_done_'+studentKey,'1');
      gas('inviaRisultatiFinali', studentName, email);
    }
    mostraConfermaEmail();
  }

  function saltaEmail(){
    if(!sGet('papiro_done_'+studentKey)) sSet('papiro_done_'+studentKey,'1');
    mostraConfermaEmail();
  }

  function mostraConfermaEmail(){
    var ds=document.querySelector('.done-screen');
    if(!ds) return;
    ds.innerHTML='<div class="seal">'+checkSvg(22)+'</div><h3>Ottimo lavoro!</h3>'+
      '<p>Ora puoi proseguire con il modulo 2.</p>';
  }

  /* ══ FEEDBACK / UTILITÀ ══ */
  function feedbackBox(id){ return '<div class="feedback" id="fb-'+id+'"></div>'; }

  /* Mostra il pulsante Prosegui SOTTO il feedback (così si legge prima di proseguire) */
  function proseguiSottoFeedback(id){
    var b=document.getElementById('btn-'+id);
    if(b && b.parentNode) b.parentNode.style.display='none';
    var fb=document.getElementById('fb-'+id);
    if(!fb || document.getElementById('go-'+id)) return;
    var act=document.createElement('div');
    act.className='card-actions'; act.id='go-'+id;
    act.innerHTML='<button class="btn" onclick="prosegui('+id+')">Prosegui</button>';
    fb.parentNode.insertBefore(act, fb.nextSibling);
    setTimeout(function(){ act.scrollIntoView({behavior:'smooth',block:'nearest'}); },80);
  }
  function mostraFeedback(id,ok,testo){ var el=document.getElementById('fb-'+id); if(!el||!testo) return; el.className='feedback show '+(ok?'ok':'ko'); el.innerHTML=pulisciHTML(testo); renderMediaBlocks(el); }
  function getCard(id){ return cards.filter(function(c){ return c.id===id; })[0]; }
  function val(id){ return (document.getElementById(id).value||'').trim(); }
  function scrollToCard(id){ var el=document.getElementById('card-'+id); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }
  function paragrafi(t){ if(!t) return ''; return String(t).split(/\n\s*\n/).map(function(p){ return '<p>'+esc(p.trim()).replace(/\n/g,'<br>')+'</p>'; }).join(''); }
  function driveIdFrom(url){ var s=String(url||''); var m=s.match(/\/file\/d\/([^/?]+)/)||s.match(/[?&]id=([^&]+)/)||s.match(/googleusercontent\.com\/d\/([^=?/]+)/); return m?m[1]:''; }
  function driveUrl(url){ if(!url) return ''; var id=driveIdFrom(url); return id?('https://lh3.googleusercontent.com/d/'+id+'=w1400'):url; }
  function checkSvg(s){ s=s||11; return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'; }
  function esc(s){ if(s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  /* Pulisce l'HTML salvato dall'editor (stili Google Docs) PRESERVANDO grassetto/corsivo/sottolineato
     e gli stili utili del riquadro (interlinea, font, allineamento) */
  function filtraStile(st){
    var keep=[];
    String(st||'').split(';').forEach(function(d){
      var i=d.indexOf(':'); if(i<0) return;
      var prop=d.slice(0,i).trim().toLowerCase(), val=d.slice(i+1).trim();
      if(['line-height','font-family','text-align'].indexOf(prop)!==-1 && val) keep.push(prop+':'+val);
    });
    return keep.join(';');
  }
  function pulisciHTML(html){
    var tmp=document.createElement('div');
    tmp.innerHTML=html;
    Array.prototype.slice.call(tmp.querySelectorAll('span,font,div,p,b,i,u,strong,em')).forEach(function(el){
      var st=el.getAttribute('style')||'';
      var bold   = /font-weight\s*:\s*(bold|[6789]00)/i.test(st);
      var italic = /font-style\s*:\s*italic/i.test(st);
      var under  = /text-decoration[^;]*underline/i.test(st);
      function wrap(tag){ var w=document.createElement(tag); while(el.firstChild) w.appendChild(el.firstChild); el.appendChild(w); }
      if(bold)   wrap('strong');
      if(italic) wrap('em');
      if(under)  wrap('u');
    });
    Array.prototype.slice.call(tmp.querySelectorAll('*')).forEach(function(el){
      var tag=el.tagName.toLowerCase();
      if(tag==='span'||tag==='font'){
        var frag=document.createDocumentFragment();
        while(el.firstChild) frag.appendChild(el.firstChild);
        el.parentNode.replaceChild(frag,el);
      } else if(tag==='img'){
        var src=el.getAttribute('src');
        clearAttrs(el); if(src) el.setAttribute('src',src);
      } else if(tag==='figure'){
        var cls=el.getAttribute('class'), dt=el.getAttribute('data-type'), du=el.getAttribute('data-url');
        clearAttrs(el);
        if(cls) el.setAttribute('class',cls);
        if(dt) el.setAttribute('data-type',dt);
        if(du) el.setAttribute('data-url',du);
      } else if(tag==='a'){
        var href=el.getAttribute('href');
        clearAttrs(el); if(href){ el.setAttribute('href',href); el.setAttribute('target','_blank'); el.setAttribute('rel','noopener'); }
      } else {
        var f=filtraStile(el.getAttribute('style'));
        var ds=el.getAttribute('data-size');
        clearAttrs(el);
        if(f) el.setAttribute('style',f);
        if(ds) el.setAttribute('data-size',ds);
      }
    });
    return tmp.innerHTML;
  }
  function clearAttrs(el){
    Array.prototype.slice.call(el.attributes).forEach(function(a){ el.removeAttribute(a.name); });
  }

  /* Converte un link Drive/YouTube nell'URL da incorporare per il video */
  function embedUrl(url){
    if(!url) return '';
    var yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]+)/);
    if(yt) return 'https://www.youtube.com/embed/'+yt[1];
    var d=url.match(/\/file\/d\/([^/?]+)/)||url.match(/[?&]id=([^&]+)/);
    if(d) return 'https://drive.google.com/file/d/'+d[1]+'/preview';
    return url;
  }
  /* Trasforma i blocchi video (figure[data-type=video]) in iframe dentro un contenitore */
  function renderMediaBlocks(root){
    if(!root) return;
    // immagini Drive: prova lh3 → thumbnail → uc (massimizza la resa sui file pubblici)
    Array.prototype.slice.call(root.querySelectorAll('img')).forEach(function(img){
      var s=img.getAttribute('src')||'';
      var id=driveIdFrom(s);
      if(id){ img.setAttribute('data-drive', id); img.setAttribute('src','https://lh3.googleusercontent.com/d/'+id+'=w1400'); }
      img.setAttribute('loading','lazy');
      img.onerror=function(){
        var did=this.getAttribute('data-drive'); if(!did){ this.style.display='none'; return; }
        var t=this.getAttribute('data-try')||'0';
        if(t==='0'){ this.setAttribute('data-try','1'); this.src='https://drive.google.com/thumbnail?id='+did+'&sz=w1400'; }
        else if(t==='1'){ this.setAttribute('data-try','2'); this.src='https://drive.google.com/uc?export=view&id='+did; }
        else { this.style.display='none'; }
      };
    });
    Array.prototype.slice.call(root.querySelectorAll('figure.cardmedia[data-type="video"]')).forEach(function(fig){
      if(fig.querySelector('iframe')) return;
      var embed=embedUrl(fig.getAttribute('data-url'));
      fig.innerHTML='<div class="video-wrap"><iframe src="'+embed+'" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>';
    });
  }
  function apriAlert(m){ document.getElementById('alert-text').innerText=m; document.getElementById('alert').classList.remove('hidden'); }
  function chiudiAlert(){ document.getElementById('alert').classList.add('hidden'); }
  </script>
